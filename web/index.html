<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c0f14">
<!-- iPad / iOS: "Add to Home Screen" gives a full-screen, app-like experience. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FH6 Telemetry">
<meta name="mobile-web-app-capable" content="yes">
<title>Forza Horizon 6 — Live Telemetry</title>
<style>
  :root {
    --bg: #0c0f14; --panel: #151a22; --line: #232b36;
    --txt: #e7edf5; --dim: #7c8a9c; --accent: #c6ff00; --warn: #ff5d5d;
    --good: #36d399; --blue: #4cc2ff; --amber: #ffb454;
  }
  * { box-sizing: border-box; }
  html, body {
    /* Prevent rubber-band scroll on iPad; keep the dashboard locked like an app. */
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
  }
  body {
    margin: 0; background: var(--bg); color: var(--txt);
    font: 14px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif;
    /* Disable iOS double-tap zoom / 300ms tap delay on interactive elements. */
    touch-action: manipulation;
    /* Honor the safe-area on notched / Dynamic-Island iPads when used as a PWA. */
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  header {
    display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 20;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--line);
    /* When PWA status bar is translucent, push the header below it. */
    padding-top: max(10px, env(safe-area-inset-top));
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .5px; }
  .burger {
    background: var(--bg); border: 1px solid var(--line); color: var(--txt);
    /* 44pt min hit area (Apple HIG touch target). */
    min-width: 44px; height: 44px; border-radius: 8px; cursor: pointer; font-size: 18px;
    -webkit-tap-highlight-color: transparent;
  }
  /* :hover sticks after a touch — only apply on real pointer devices. */
  @media (hover: hover) { .burger:hover { border-color: var(--accent); } }
  .burger:active { border-color: var(--accent); }
  .status { display: flex; align-items: center; gap: 8px; margin-left: auto; color: var(--dim); font-size: 13px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--warn); }
  .dot.on { background: var(--good); box-shadow: 0 0 8px var(--good); }

  .grid {
    display: grid; gap: 14px; padding: 16px;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    max-width: 1280px; margin: 0 auto; align-items: start;
    /* Account for bottom safe-area when in landscape PWA mode. */
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px; position: relative; min-width: 0;
  }
  .card.wide { grid-column: span 2; }
  /* iPad portrait (~768px) only fits ~2-3 columns, so wide cards span the full row
     rather than awkwardly half-spanning. */
  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    .card.wide { grid-column: 1 / -1; }
  }
  /* Phone-ish widths: single column for readability. */
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; padding: 10px; }
    .card.wide { grid-column: 1; }
  }
  .card h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--dim); margin: 0 0 10px; display: flex; justify-content: space-between;
  }
  .card h2 .sub { color: var(--line); font-weight: 600; }
  canvas { display: block; width: 100%; }

  .big { font-size: 84px; font-weight: 800; line-height: 1; color: var(--accent); text-align: center; }
  .bigval { font-size: 40px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: center; }
  .bigval .u { font-size: 14px; color: var(--dim); font-weight: 500; margin-left: 4px; }

  .bars { display: flex; gap: 16px; align-items: flex-end; height: 140px; justify-content: center; }
  .bar-wrap { text-align: center; }
  .bar-track {
    width: 42px; height: 110px; background: var(--bg); border: 1px solid var(--line);
    border-radius: 6px; overflow: hidden; display: flex; align-items: flex-end;
  }
  .bar-fill { width: 100%; height: 0%; transition: height .05s linear; }
  .bar-label { font-size: 11px; color: var(--dim); margin-top: 6px; }
  .bar-val { font-size: 12px; font-variant-numeric: tabular-nums; margin-top: 2px; }

  .bidir { height: 14px; background: var(--bg); border: 1px solid var(--line); border-radius: 7px;
           position: relative; overflow: hidden; margin: 6px 0; }
  .bidir .mid { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--line); }
  .bidir .fill { position: absolute; top: 0; bottom: 0; background: var(--blue); }

  .tires { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tire { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 10px; text-align: center; }
  .tire .t { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .tire .lbl { font-size: 10px; color: var(--dim); }

  .rows .row { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid var(--line); }
  .rows .row:first-child { border-top: 0; }
  .rows .k { color: var(--dim); }
  .rows .v { font-variant-numeric: tabular-nums; font-weight: 600; }
  .rows .minibar { flex: 1; margin: 0 10px; align-self: center; }

  .ledwrap { display: flex; align-items: center; gap: 10px; justify-content: center; padding: 12px 0; }
  .led { width: 22px; height: 22px; border-radius: 50%; background: var(--line); }
  .led.on { background: var(--good); box-shadow: 0 0 10px var(--good); }

  .laplist { display: flex; flex-direction: column; gap: 4px; }
  .laplist .lap { display: flex; justify-content: space-between; padding: 5px 8px;
                  background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
                  font-variant-numeric: tabular-nums; }
  .laplist .lap.latest { border-color: var(--accent); }
  .laplist .lap.best { background: rgba(54, 211, 153, 0.12); border-color: var(--good); }
  .laplist .lap .n { color: var(--dim); font-size: 11px; }
  .laplist .lap .t { font-weight: 600; }
  .laplist .empty { color: var(--dim); text-align: center; padding: 18px 0; font-size: 12px; }

  .hint { color: var(--dim); font-size: 12px; padding: 0 18px 24px; max-width: 1280px; margin: 0 auto; }
  .empty { color: var(--dim); text-align: center; padding: 60px 20px; }

  /* drawer */
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none;
              transition: opacity .2s; z-index: 30; }
  .backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0; width: 340px; max-width: 85vw; z-index: 40;
    background: var(--panel); border-right: 1px solid var(--line);
    transform: translateX(-100%); transition: transform .22s ease; overflow-y: auto;
    -webkit-overflow-scrolling: touch;            /* momentum scroll on iOS */
    overscroll-behavior: contain;                 /* don't propagate scroll to body */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .drawer.open { transform: translateX(0); }
  .drawer header { position: sticky; top: 0; }
  .drawer h3 { margin: 0; font-size: 14px; }
  .drawer .actions { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
  .drawer .actions button {
    flex: 1; background: var(--bg); border: 1px solid var(--line); color: var(--txt);
    padding: 10px 0; border-radius: 7px; cursor: pointer; font-size: 13px;
    min-height: 38px; -webkit-tap-highlight-color: transparent;
  }
  @media (hover: hover) { .drawer .actions button:hover { border-color: var(--accent); } }
  .drawer .actions button:active { border-color: var(--accent); background: var(--line); }
  .group { padding: 6px 0; }
  .group > .gh { padding: 10px 16px 4px; color: var(--accent); font-size: 11px;
                 text-transform: uppercase; letter-spacing: 1px; }
  /* Bigger touch target for each toggle row (44pt iOS HIG). */
  label.item { display: flex; align-items: center; gap: 12px; padding: 11px 16px; cursor: pointer;
               min-height: 44px; -webkit-tap-highlight-color: transparent; }
  @media (hover: hover) { label.item:hover { background: var(--bg); } }
  label.item:active { background: var(--bg); }
  label.item input { accent-color: var(--accent); width: 20px; height: 20px; }
  label.item .nm { flex: 1; }
  label.item .ty { color: var(--dim); font-size: 11px; }
  .closeX { background: none; border: 0; color: var(--dim); font-size: 22px; cursor: pointer; margin-left: auto;
            min-width: 44px; min-height: 44px; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<header>
  <button class="burger" id="burger" title="Choose widgets">☰</button>
  <h1>FORZA HORIZON 6 · TELEMETRY</h1>
  <div class="status">
    <span id="dashbase"></span>
    <span class="dot" id="dot"></span>
    <span id="statustext">connecting…</span>
  </div>
</header>

<div class="grid" id="grid"></div>
<p class="hint" id="hint"></p>

<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer">
  <header>
    <h3>Widgets</h3>
    <button class="closeX" id="closeX">×</button>
  </header>
  <div class="actions">
    <button id="actDefaults">Defaults</button>
    <button id="actAll">All on</button>
    <button id="actNone">All off</button>
  </div>
  <div id="menu"></div>
</aside>

<script>
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const fmt = (v, d=0) => v == null || Number.isNaN(v) ? '–' : Number(v).toFixed(d);
const CORNERS = [['FL','fl'],['FR','fr'],['RL','rl'],['RR','rr']];

function fmtTime(s) {
  if (s == null || s <= 0) return '–';
  const m = Math.floor(s / 60), sec = s - m * 60;
  return `${m}:${sec.toFixed(3).padStart(6, '0')}`;
}
function tireTempColor(v) {
  if (v == null) return css('--dim');
  const t = Math.max(0, Math.min(1, v / 240));           // FH6 temps run high; relative heat scale
  const hue = 210 - 210 * t;                              // blue(cool) -> red(hot)
  return `hsl(${hue}, 80%, 60%)`;
}
function slipColor(v) {
  if (v == null) return css('--dim');
  const t = Math.max(0, Math.min(1, Math.abs(v)));        // 0 grip (green) -> 1+ (red)
  const hue = 140 - 140 * t;
  return `hsl(${hue}, 75%, 58%)`;
}

/* ---- canvas primitives -------------------------------------------------- */
function drawGauge(cv, value, max, unit, color) {
  const ctx = cv.getContext('2d'), w = cv.width, h = cv.height;
  const cx = w/2, cy = h*0.78, r = Math.min(w, h)*0.62, A = Math.PI*0.8, B = Math.PI*2.2;
  ctx.clearRect(0,0,w,h); ctx.lineWidth = 12; ctx.lineCap = 'round';
  ctx.strokeStyle = css('--line'); ctx.beginPath(); ctx.arc(cx,cy,r,A,B); ctx.stroke();
  const f = Math.max(0, Math.min(1, value/max));
  ctx.strokeStyle = color; ctx.beginPath(); ctx.arc(cx,cy,r,A,A+(B-A)*f); ctx.stroke();
  ctx.fillStyle = css('--txt'); ctx.textAlign = 'center'; ctx.font = '700 32px sans-serif';
  ctx.fillText(Math.round(value), cx, cy-2);
  ctx.fillStyle = css('--dim'); ctx.font = '12px sans-serif'; ctx.fillText(unit, cx, cy+15);
}
function drawChart(cv, pts, color, opts={}) {
  const ctx = cv.getContext('2d'), w = cv.width, h = cv.height, pad = 6;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = css('--line'); ctx.lineWidth = 1;
  let lo = opts.min, hi = opts.max;
  if (lo == null || hi == null) {                         // autoscale
    const vals = pts.filter(v => v != null);
    lo = Math.min(...vals, 0); hi = Math.max(...vals, 1);
    if (hi === lo) hi = lo + 1;
  }
  const zeroY = h - pad - ((0 - lo)/(hi - lo))*(h - 2*pad);
  ctx.beginPath(); ctx.moveTo(0, Math.max(pad, Math.min(h-pad, zeroY)));
  ctx.lineTo(w, Math.max(pad, Math.min(h-pad, zeroY))); ctx.stroke();
  if (pts.length < 2) return;
  const n = pts.length;
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
  pts.forEach((p, i) => {
    const x = (i/(n-1))*w;
    const y = h - pad - (Math.max(0, Math.min(1, (p - lo)/(hi - lo))))*(h - 2*pad);
    i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
  });
  ctx.stroke();
}
function drawGG(cv, latG, longG) {
  const ctx = cv.getContext('2d'), w = cv.width, h = cv.height;
  const cx = w/2, cy = h/2, R = Math.min(w,h)/2 - 8, SCALE = 1.5; // 1.5g full scale
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = css('--line'); ctx.lineWidth = 1;
  [0.5, 1].forEach(g => { ctx.beginPath(); ctx.arc(cx,cy,R*g/SCALE,0,7); ctx.stroke(); });
  ctx.beginPath(); ctx.moveTo(cx-R,cy); ctx.lineTo(cx+R,cy);
  ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
  const px = cx + Math.max(-1, Math.min(1, latG/SCALE))*R;
  const py = cy - Math.max(-1, Math.min(1, longG/SCALE))*R;
  ctx.fillStyle = css('--accent'); ctx.beginPath(); ctx.arc(px,py,5,0,7); ctx.fill();
  ctx.fillStyle = css('--dim'); ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`${Math.hypot(latG,longG).toFixed(2)} g`, cx, h-4);
}
function drawMap(cv, trail) {
  const ctx = cv.getContext('2d'), w = cv.width, h = cv.height, pad = 10;
  ctx.clearRect(0,0,w,h);
  if (trail.length < 2) return;
  let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
  for (const p of trail){ minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minZ=Math.min(minZ,p.z);maxZ=Math.max(maxZ,p.z); }
  const sx = (maxX-minX)||1, sz = (maxZ-minZ)||1, s = Math.min((w-2*pad)/sx, (h-2*pad)/sz);
  const X = x => pad + (x-minX)*s, Y = z => h - pad - (z-minZ)*s;

  // Color each trail segment by driver input at the segment's START point:
  //  - red intensity for brake (takes precedence — it's the more interesting signal)
  //  - green intensity for throttle
  //  - dim gray for coasting (no significant input)
  // Bucketing into a few intensity buckets keeps the segment count manageable
  // while letting partial-throttle / trail-braking still read visually.
  ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  const dim = css('--line');
  function segColor(p) {
    const t = p.t ?? 0, b = p.b ?? 0;
    if (b > 30) return `rgba(255, 93, 93, ${0.45 + 0.55 * Math.min(1, b/255)})`;   // brake
    if (t > 30) return `rgba(54, 211, 153, ${0.45 + 0.55 * Math.min(1, t/255)})`;  // throttle
    return dim;                                                                    // coast
  }
  for (let i = 1; i < trail.length; i++) {
    const a = trail[i-1], c = trail[i];
    ctx.strokeStyle = segColor(a);
    ctx.beginPath(); ctx.moveTo(X(a.x), Y(a.z)); ctx.lineTo(X(c.x), Y(c.z)); ctx.stroke();
  }

  // Current position dot
  const last = trail[trail.length-1];
  ctx.fillStyle = css('--accent'); ctx.beginPath(); ctx.arc(X(last.x), Y(last.z), 4, 0, 7); ctx.fill();

  // Legend (compact, top-left)
  ctx.font = '10px sans-serif'; ctx.textBaseline = 'middle';
  const legend = [
    [css('--good'), 'throttle'],
    [css('--warn'), 'brake'],
    [dim,           'coast'],
  ];
  let lx = pad, ly = pad + 4;
  for (const [col, lbl] of legend) {
    ctx.fillStyle = col; ctx.fillRect(lx, ly - 4, 10, 3);
    ctx.fillStyle = css('--dim'); ctx.fillText(lbl, lx + 14, ly - 2);
    lx += ctx.measureText(lbl).width + 32;
  }
}

/* ---- field catalog: every Forza value + how to visualize it -------------- */
const MAXPTS = 1200;
const FIELDS = [
  // Speed & Engine
  { id:'speed_gauge', g:'Speed & Engine', label:'Speed (gauge)', type:'gauge', def:true,
    read:d=>d.speed_kmh, max:320, unit:'km/h', color:'--accent' },
  { id:'speed_chart', g:'Speed & Engine', label:'Speed (graph)', type:'line', def:true, wide:true,
    read:d=>d.speed_kmh, min:0, max:320, color:'--accent', tip:'km/h' },
  { id:'rpm_gauge', g:'Speed & Engine', label:'Engine RPM (gauge)', type:'gauge', def:true,
    read:d=>d.current_engine_rpm, max:d=>d.engine_max_rpm||8000, unit:'rpm',
    color:d=>(d.current_engine_rpm > (d.engine_max_rpm||8000)*0.92 ? '--warn':'--blue') },
  { id:'rpm_chart', g:'Speed & Engine', label:'RPM (graph)', type:'line', def:true, wide:true,
    read:d=>d.current_engine_rpm, min:0, max:d=>d.engine_max_rpm||8000, color:'--blue', tip:'rpm' },
  { id:'gear', g:'Speed & Engine', label:'Gear', type:'big', def:true, read:d=>d.gear_label },
  { id:'engine_max_rpm', g:'Speed & Engine', label:'Redline', type:'value', read:d=>d.engine_max_rpm, unit:'rpm' },
  { id:'engine_idle_rpm', g:'Speed & Engine', label:'Idle RPM', type:'value', read:d=>d.engine_idle_rpm, unit:'rpm' },

  // Drivetrain
  { id:'power', g:'Drivetrain', label:'Power', type:'gauge', def:true, read:d=>d.power/1000, max:600, unit:'kW', color:'--amber' },
  { id:'torque', g:'Drivetrain', label:'Torque', type:'gauge', def:true, read:d=>d.torque, max:800, unit:'Nm', color:'--amber' },
  { id:'boost', g:'Drivetrain', label:'Boost', type:'bidir', def:true, read:d=>d.boost, span:30, unit:'' },
  { id:'fuel', g:'Drivetrain', label:'Fuel', type:'bar', def:true, read:d=>d.fuel*100, max:100, unit:'%', color:'--good' },

  // Inputs
  { id:'throttle_chart', g:'Inputs', label:'Throttle (trace)', type:'line', def:true, wide:true,
    read:d=>(d.accel??0)/255*100, min:0, max:100, color:'--good', tip:'%', pts:900 },
  { id:'brake_chart', g:'Inputs', label:'Brake (trace)', type:'line', def:true, wide:true,
    read:d=>(d.brake??0)/255*100, min:0, max:100, color:'--warn', tip:'%', pts:900 },
  { id:'steer', g:'Inputs', label:'Steering', type:'bidir', def:true, read:d=>d.steer, span:127, unit:'' },
  { id:'clutch', g:'Inputs', label:'Clutch', type:'bar', read:d=>d.clutch/255*100, max:100, unit:'%', color:'--blue' },
  { id:'handbrake', g:'Inputs', label:'Handbrake', type:'bar', read:d=>d.handbrake/255*100, max:100, unit:'%', color:'--warn' },
  { id:'driving_line', g:'Inputs', label:'Driving line', type:'value', read:d=>d.normalized_driving_line },

  // Tires & Wheels
  { id:'tire_temp', g:'Tires & Wheels', label:'Tire temps', type:'wheels', def:true, base:'tire_temp', dec:0, color:tireTempColor },
  { id:'tire_slip_ratio', g:'Tires & Wheels', label:'Slip ratio', type:'wheels', base:'tire_slip_ratio', dec:2, color:slipColor },
  { id:'tire_slip_angle', g:'Tires & Wheels', label:'Slip angle', type:'wheels', base:'tire_slip_angle', dec:2, color:slipColor },
  { id:'tire_combined_slip', g:'Tires & Wheels', label:'Combined slip', type:'wheels', base:'tire_combined_slip', dec:2, color:slipColor },
  { id:'wheel_rot_speed', g:'Tires & Wheels', label:'Wheel rotation', type:'wheels', base:'wheel_rot_speed', dec:0 },
  { id:'wheel_on_rumble', g:'Tires & Wheels', label:'On rumble strip', type:'wheels', base:'wheel_on_rumble', bool:true },
  { id:'wheel_in_puddle', g:'Tires & Wheels', label:'In puddle', type:'wheels', base:'wheel_in_puddle', dec:2 },
  { id:'surface_rumble', g:'Tires & Wheels', label:'Surface rumble', type:'wheels', base:'surface_rumble', dec:2 },

  // Suspension
  { id:'norm_susp_travel', g:'Suspension', label:'Susp travel (norm)', type:'wheels', base:'norm_susp_travel', dec:2 },
  { id:'susp_travel_m', g:'Suspension', label:'Susp travel (m)', type:'wheels', base:'susp_travel_m', dec:3 },

  // Chassis / Motion
  { id:'gforce', g:'Chassis / Motion', label:'G-force', type:'gg', def:true },
  { id:'acceleration', g:'Chassis / Motion', label:'Acceleration', type:'multi', unit:'m/s²', span:30,
    parts:[['X (lat)',d=>d.acceleration_x],['Y (vert)',d=>d.acceleration_y],['Z (long)',d=>d.acceleration_z]] },
  { id:'velocity', g:'Chassis / Motion', label:'Velocity', type:'multi', unit:'m/s', span:80,
    parts:[['X',d=>d.velocity_x],['Y',d=>d.velocity_y],['Z',d=>d.velocity_z]] },
  { id:'angular_velocity', g:'Chassis / Motion', label:'Angular velocity', type:'multi', unit:'rad/s', span:5,
    parts:[['Roll',d=>d.angular_velocity_x],['Yaw',d=>d.angular_velocity_y],['Pitch',d=>d.angular_velocity_z]] },
  { id:'orientation', g:'Chassis / Motion', label:'Orientation', type:'multi', unit:'rad', span:3.2,
    parts:[['Yaw',d=>d.yaw],['Pitch',d=>d.pitch],['Roll',d=>d.roll]] },

  // Position
  { id:'map', g:'Position', label:'Track map', type:'map', wide:true },
  { id:'position', g:'Position', label:'World position', type:'multi', unit:'', span:null,
    parts:[['X',d=>d.position_x],['Y',d=>d.position_y],['Z',d=>d.position_z]] },

  // Lap & Race
  { id:'current_lap', g:'Lap & Race', label:'Current lap', type:'time', read:d=>d.current_lap },
  { id:'last_lap', g:'Lap & Race', label:'Last 5 laps', type:'laps', def:true, keep:5 },
  { id:'best_lap', g:'Lap & Race', label:'Best lap', type:'time', read:d=>d.best_lap },
  { id:'current_race_time', g:'Lap & Race', label:'Race time', type:'time', read:d=>d.current_race_time },
  { id:'lap_number', g:'Lap & Race', label:'Lap number', type:'value', read:d=>d.lap_number },
  { id:'race_position', g:'Lap & Race', label:'Race position', type:'value', read:d=>d.race_position },
  { id:'distance_traveled', g:'Lap & Race', label:'Distance', type:'value', read:d=>d.distance_traveled, unit:'m', dec:0 },

  // Car Info
  { id:'car_class', g:'Car Info', label:'Class', type:'enum', read:d=>d.car_class, map:{0:'D',1:'C',2:'B',3:'A',4:'S1',5:'S2',6:'S2',7:'X'} },
  { id:'car_performance_index', g:'Car Info', label:'PI', type:'value', read:d=>d.car_performance_index },
  { id:'drivetrain', g:'Car Info', label:'Drivetrain', type:'enum', read:d=>d.drivetrain_type, map:{0:'FWD',1:'RWD',2:'AWD'} },
  { id:'num_cylinders', g:'Car Info', label:'Cylinders', type:'value', read:d=>d.num_cylinders },
  { id:'car_ordinal', g:'Car Info', label:'Car ID', type:'value', read:d=>d.car_ordinal },

  // Status
  { id:'is_racing', g:'Status', label:'Race active', type:'bool', read:d=>d.is_racing },
  { id:'dash_base', g:'Status', label:'Dash offset', type:'value', read:d=>d.dash_base },
  { id:'timestamp_ms', g:'Status', label:'Game time', type:'value', read:d=>d.timestamp_ms, unit:'ms' },
];
const BYID = Object.fromEntries(FIELDS.map(f => [f.id, f]));
const resolve = (v, d) => typeof v === 'function' ? v(d) : v;

/* ---- widget factory: build DOM + update fn for a field ------------------- */
function makeWidget(f) {
  const card = document.createElement('div');
  card.className = 'card' + (f.wide ? ' wide' : '');
  const h2 = document.createElement('h2');
  h2.innerHTML = `<span>${f.label}</span><span class="sub" id="sub"></span>`;
  card.appendChild(h2);
  const body = document.createElement('div');
  card.appendChild(body);
  let update;

  if (f.type === 'gauge') {
    const cv = Object.assign(document.createElement('canvas'), {width:220, height:150});
    body.appendChild(cv);
    update = d => drawGauge(cv, f.read(d)||0, resolve(f.max,d), f.unit, css(resolve(f.color,d)||'--accent'));
  } else if (f.type === 'line') {
    const cv = Object.assign(document.createElement('canvas'), {width:600, height:130});
    body.appendChild(cv); const hist = []; const cap = f.pts || MAXPTS;
    update = d => {
      const v = f.read(d); if (v != null && d.is_racing) hist.push(v);
      if (hist.length > cap) hist.shift();
      drawChart(cv, hist, css(f.color), {min:f.min, max:resolve(f.max,d)});
    };
  } else if (f.type === 'big') {
    const e = document.createElement('div'); e.className = 'big'; e.textContent = '–';
    body.appendChild(e); update = d => e.textContent = f.read(d) ?? '–';
  } else if (f.type === 'value') {
    const e = document.createElement('div'); e.className = 'bigval';
    e.innerHTML = `<span class="n">–</span><span class="u">${f.unit||''}</span>`;
    body.appendChild(e); const n = e.querySelector('.n');
    update = d => n.textContent = fmt(f.read(d), f.dec ?? 0);
  } else if (f.type === 'enum') {
    const e = document.createElement('div'); e.className = 'bigval'; e.textContent = '–';
    body.appendChild(e); update = d => { const v = f.read(d); e.textContent = v==null ? '–' : (f.map[v] ?? v); };
  } else if (f.type === 'time') {
    const e = document.createElement('div'); e.className = 'bigval'; e.textContent = '–';
    body.appendChild(e); update = d => e.textContent = fmtTime(f.read(d));
  } else if (f.type === 'laps') {
    // Rolling history of the last N completed lap times. The game exposes
    // `last_lap` (seconds) and `lap_number` (current lap). When lap_number
    // ticks up — or last_lap changes to a new non-zero value — that's a lap
    // completion; capture it. Tagged with the lap number it belongs to.
    body.innerHTML = `<div class="laplist" id="lst"><div class="empty">No laps yet</div></div>`;
    const lst = body.querySelector('#lst');
    const keep = f.keep || 5;
    const history = []; // [{n: lap#, t: seconds}]
    let prevLapNum = null, prevLastLap = null;
    update = d => {
      const cur = d.lap_number ?? null, last = d.last_lap ?? 0;
      const isNewLap = last > 0 && (
        (prevLapNum != null && cur != null && cur > prevLapNum) ||
        (prevLastLap != null && Math.abs(last - prevLastLap) > 1e-3)
      );
      if (isNewLap) {
        // The lap that just finished is the one before `cur` (or unknown).
        const completedNum = cur != null ? cur - 1 : (history.length ? history[history.length-1].n + 1 : 1);
        history.push({ n: completedNum, t: last });
        if (history.length > keep) history.shift();
      }
      prevLapNum = cur; prevLastLap = last;

      if (!history.length) { lst.innerHTML = '<div class="empty">No laps yet</div>'; return; }
      const best = Math.min(...history.map(h => h.t));
      lst.innerHTML = history.slice().reverse().map((h, i) => {
        const cls = (h.t === best ? 'best ' : '') + (i === 0 ? 'latest' : '');
        return `<div class="lap ${cls}"><span class="n">Lap ${h.n}</span><span class="t">${fmtTime(h.t)}</span></div>`;
      }).join('');
    };
  } else if (f.type === 'bool') {
    body.innerHTML = `<div class="ledwrap"><span class="led" id="l"></span><span id="t">–</span></div>`;
    const l = body.querySelector('#l'), t = body.querySelector('#t');
    update = d => { const v = !!f.read(d); l.classList.toggle('on', v); t.textContent = v ? 'YES' : 'no'; };
  } else if (f.type === 'bar') {
    body.innerHTML = `<div class="bars"><div class="bar-wrap">
      <div class="bar-track"><div class="bar-fill" style="background:${css(f.color)}"></div></div>
      <div class="bar-val" id="v">–</div></div></div>`;
    const fill = body.querySelector('.bar-fill'), v = body.querySelector('#v');
    update = d => { const val = f.read(d)||0; fill.style.height = Math.max(0,Math.min(100,val/f.max*100))+'%';
                    v.textContent = fmt(val,0)+(f.unit||''); };
  } else if (f.type === 'bidir') {
    body.innerHTML = `<div class="bidir"><div class="mid"></div><div class="fill"></div></div>
      <div style="text-align:center;font-variant-numeric:tabular-nums" id="v">–</div>`;
    const fill = body.querySelector('.fill'), v = body.querySelector('#v');
    update = d => {
      const val = f.read(d)||0, frac = Math.max(-1,Math.min(1,val/f.span));
      v.textContent = fmt(val, 2) + (f.unit||'');
      if (frac >= 0) { fill.style.left='50%'; fill.style.right='auto'; fill.style.width=(frac*50)+'%';
                       fill.style.background=css('--good'); }
      else { fill.style.right='50%'; fill.style.left='auto'; fill.style.width=(-frac*50)+'%';
             fill.style.background=css('--warn'); }
    };
  } else if (f.type === 'wheels') {
    body.className = 'tires';
    const cells = {};
    for (const [lbl, sfx] of CORNERS) {
      const c = document.createElement('div'); c.className = 'tire';
      c.innerHTML = `<div class="t">–</div><div class="lbl">${lbl}</div>`;
      body.appendChild(c); cells[sfx] = c.querySelector('.t');
    }
    update = d => { for (const [,sfx] of CORNERS) {
      const v = d[`${f.base}_${sfx}`], el = cells[sfx];
      el.textContent = v==null ? '–' : (f.bool ? (v ? '●' : '○') : fmt(v, f.dec));
      if (f.color) el.style.color = f.color(v);
    }};
  } else if (f.type === 'multi') {
    body.className = 'rows';
    const rows = f.parts.map(([lbl]) => {
      const r = document.createElement('div'); r.className = 'row';
      r.innerHTML = f.span!=null
        ? `<span class="k">${lbl}</span><div class="bidir minibar"><div class="mid"></div><div class="fill"></div></div><span class="v">–</span>`
        : `<span class="k">${lbl}</span><span class="v">–</span>`;
      body.appendChild(r); return r;
    });
    update = d => f.parts.forEach(([,get], i) => {
      const val = get(d)||0, r = rows[i];
      r.querySelector('.v').textContent = fmt(val, 2);
      if (f.span != null) {
        const fill = r.querySelector('.fill'), frac = Math.max(-1,Math.min(1,val/f.span));
        if (frac >= 0){ fill.style.left='50%'; fill.style.width=(frac*50)+'%'; fill.style.background=css('--good'); }
        else { fill.style.left='auto'; fill.style.right='50%'; fill.style.width=(-frac*50)+'%'; fill.style.background=css('--warn'); }
      }
    });
  } else if (f.type === 'gg') {
    const cv = Object.assign(document.createElement('canvas'), {width:200, height:200});
    cv.style.maxWidth = '200px'; cv.style.margin = '0 auto'; body.appendChild(cv);
    update = d => drawGG(cv, (d.acceleration_x||0)/9.81, (d.acceleration_z||0)/9.81);
  } else if (f.type === 'map') {
    const cv = Object.assign(document.createElement('canvas'), {width:600, height:260});
    body.appendChild(cv); const trail = [];
    update = d => {
      if (d.is_racing && d.position_x != null) {
        // Capture throttle (accel) and brake with each point so drawMap can
        // color the trail by driver input (overlays #5 onto the track map).
        trail.push({x:d.position_x, z:d.position_z, t:d.accel ?? 0, b:d.brake ?? 0});
        if (trail.length > MAXPTS*4) trail.shift();
      }
      drawMap(cv, trail);
    };
  }
  return { el: card, update };
}

/* ---- config (which widgets are enabled), persisted ---------------------- */
const KEY = 'fh6_widgets';
const DEFAULTS = FIELDS.filter(f => f.def).map(f => f.id);
function loadCfg() {
  try { const s = JSON.parse(localStorage.getItem(KEY)); if (Array.isArray(s)) return new Set(s); } catch {}
  return new Set(DEFAULTS);
}
function saveCfg(set) { localStorage.setItem(KEY, JSON.stringify([...set])); }
let enabled = loadCfg();

const grid = document.getElementById('grid'), hint = document.getElementById('hint');
const active = new Map();   // id -> {el, update}

function applyConfig() {
  for (const f of FIELDS) {
    if (enabled.has(f.id) && !active.has(f.id)) active.set(f.id, makeWidget(f));
    else if (!enabled.has(f.id) && active.has(f.id)) { active.get(f.id).el.remove(); active.delete(f.id); }
  }
  for (const f of FIELDS) if (active.has(f.id)) grid.appendChild(active.get(f.id).el); // catalog order
  hint.textContent = active.size === 0
    ? 'No widgets selected — open the ☰ menu to choose values to display.'
    : `${active.size} widgets · speed derived from the velocity vector (reliable on FH6). Use ☰ to customize.`;
}

/* ---- drawer menu -------------------------------------------------------- */
const menu = document.getElementById('menu');
function buildMenu() {
  menu.innerHTML = '';
  let lastG = null, gEl;
  for (const f of FIELDS) {
    if (f.g !== lastG) {
      lastG = f.g; gEl = document.createElement('div'); gEl.className = 'group';
      gEl.innerHTML = `<div class="gh">${f.g}</div>`; menu.appendChild(gEl);
    }
    const lab = document.createElement('label'); lab.className = 'item';
    lab.innerHTML = `<input type="checkbox" ${enabled.has(f.id)?'checked':''}>
                     <span class="nm">${f.label}</span><span class="ty">${f.type}</span>`;
    lab.querySelector('input').addEventListener('change', e => {
      e.target.checked ? enabled.add(f.id) : enabled.delete(f.id);
      saveCfg(enabled); applyConfig();
    });
    gEl.appendChild(lab);
  }
}
const drawer = document.getElementById('drawer'), backdrop = document.getElementById('backdrop');
const openDrawer = () => { drawer.classList.add('open'); backdrop.classList.add('open'); };
const closeDrawer = () => { drawer.classList.remove('open'); backdrop.classList.remove('open'); };
document.getElementById('burger').onclick = openDrawer;
document.getElementById('closeX').onclick = closeDrawer;
backdrop.onclick = closeDrawer;

// Touch: swipe the drawer left to close (iPad-friendly).
let _touchStartX = null;
drawer.addEventListener('touchstart', e => { _touchStartX = e.touches[0].clientX; }, {passive:true});
drawer.addEventListener('touchend', e => {
  if (_touchStartX == null) return;
  const dx = (e.changedTouches[0].clientX - _touchStartX);
  if (dx < -60) closeDrawer();
  _touchStartX = null;
}, {passive:true});
document.getElementById('actDefaults').onclick = () => { enabled = new Set(DEFAULTS); saveCfg(enabled); buildMenu(); applyConfig(); };
document.getElementById('actAll').onclick = () => { enabled = new Set(FIELDS.map(f=>f.id)); saveCfg(enabled); buildMenu(); applyConfig(); };
document.getElementById('actNone').onclick = () => { enabled = new Set(); saveCfg(enabled); buildMenu(); applyConfig(); };

buildMenu();
applyConfig();

/* ---- live stream -------------------------------------------------------- */
const dot = document.getElementById('dot'), statustext = document.getElementById('statustext'),
      dashbase = document.getElementById('dashbase');

// Persist values across pause / race-end / stream gaps. We keep a rolling
// snapshot ("retained") of the last packet that carried real data and render
// widgets from it, so readouts hold their last value instead of blanking when
// the game pauses, a race ends, or packets stop arriving. A pause/menu frame
// (is_race_on 0 with zeroed fields) does NOT overwrite the snapshot — only a
// "meaningful" packet does — but live connection/identity bits always update.
let retained = null;       // last merged snapshot we render from
let lastFreshAt = 0;       // Date.now() of the last meaningful packet
const STALE_MS = 1500;     // no fresh data for this long => "holding" status

function isMeaningful(d) {
  return d.is_racing || (d.current_engine_rpm > 0) || (d.speed_kmh > 0.5);
}

function handlePacket(d) {
  const now = Date.now();
  if (retained === null) retained = {};

  if (d.connected) {
    if (isMeaningful(d)) {
      Object.assign(retained, d);   // overlay fresh values, keep the rest
      lastFreshAt = now;
    } else {
      // Hold prior values; only reflect live connection/identity bits so the
      // charts/map stop adding history (they gate on is_racing) during a pause.
      retained.connected = d.connected;
      retained.is_racing = d.is_racing;
      if (d.dash_base != null) retained.dash_base = d.dash_base;
    }
  }

  const view = retained || d;
  const stale = (now - lastFreshAt) > STALE_MS;

  dot.classList.toggle('on', !!d.connected);
  statustext.textContent = !d.connected ? 'waiting for game…'
                         : d.is_racing  ? 'live'
                         : stale        ? 'paused — holding last values'
                                        : 'in menu / paused';
  dashbase.textContent = view.dash_base != null ? `dash@${view.dash_base}` : '';

  for (const w of active.values()) w.update(view);
}

const es = new EventSource('/stream');
es.onmessage = ev => handlePacket(JSON.parse(ev.data));
es.onerror = () => { statustext.textContent = 'stream lost — holding last values'; };
</script>
</body>
</html>
